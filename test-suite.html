<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBH Quote — Test Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5EFE7;--surface:#FCF8F2;--panel:#EAE0D4;--line:#D9CCBA;--ink:#3B2F26;--muted:#8E7D6B;--amber:#A47864;--sage:#7A9A8B;--ok:#5E8C6A;--warn:#C8892F;--err:#C25E6E;--mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:28px 24px;-webkit-font-smoothing:antialiased}
h1{font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:32px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.stat .k{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.stat .v{font-family:var(--mono);font-size:30px;font-weight:700;margin-top:2px;color:var(--ink)}
.stat.s-ok .v{color:var(--ok)}.stat.s-fail .v{color:var(--err)}.stat.s-warn .v{color:var(--warn)}.stat.s-total .v{color:var(--amber)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{font-family:var(--mono);font-size:11px;padding:6px 13px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;letter-spacing:.3px}
.filter-btn.active{background:var(--amber);color:#FFF7F0;border-color:var(--amber)}
.category{margin-bottom:28px}
.cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.cat-head span{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber)}
.cat-stats{font-family:var(--mono);font-size:11px;color:var(--muted)}
.test{background:var(--surface);border:1px solid var(--line);border-radius:10px;margin-bottom:6px;overflow:hidden}
.test.t-fail{border-color:rgba(194,94,110,.4)}
.test.t-warn{border-color:rgba(200,137,47,.35)}
.test-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.test-head:hover{background:var(--panel)}
.badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.5px;flex:none;text-transform:uppercase}
.badge.pass{background:rgba(94,140,106,.13);color:var(--ok)}
.badge.fail{background:rgba(194,94,110,.13);color:var(--err)}
.badge.warn{background:rgba(200,137,47,.13);color:var(--warn)}
.test-name{flex:1;font-size:13px;font-weight:500}
.test-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
.test-body{padding:10px 14px 12px;border-top:1px dashed var(--line);background:var(--panel);display:none}
.test-body.open{display:block}
.test-msg{font-size:12px;margin-bottom:6px;line-height:1.5}
.test-msg.ok{color:var(--ok)}.test-msg.err{color:var(--err)}.test-msg.wrn{color:var(--warn)}
.test-body pre{font-family:var(--mono);font-size:10.5px;color:var(--ink);white-space:pre-wrap;word-break:break-all;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:6px;max-height:160px;overflow:auto}
.progress{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:24px;font-family:var(--mono);font-size:12px}
.progress-bar{height:6px;border-radius:3px;background:var(--line);margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--sage);transition:width .1s}
</style>
</head>
<body>
<h1>MBH Quote — Test Suite</h1>
<div class="subtitle">// laser quote engine · parser + geometry + pricing stress tests</div>

<div class="progress" id="progress">Running tests…<div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div></div>

<div class="summary" id="summary"></div>
<div class="filter-bar" id="filterBar"></div>
<div id="results"></div>

<!-- Hidden DOM inputs required by computePlan / price / sched -->
<div style="display:none" aria-hidden="true">
  <input id="s_margin"    value="1.5">
  <input id="s_setup"     value="8">
  <input id="s_min"       value="15">
  <input id="s_safety"    value="15">
  <input id="s_voldisc"   value="2">
  <input id="s_voldiscmax" value="40">
  <input id="s_machine"   value="1.50">
  <input id="s_polish"    value="0.015">
  <input id="s_transit"   value="0.03">
  <input id="s_score"     value="120">
  <input id="s_fill_std"  value="200">
  <input id="s_fill_fine" value="110">
  <input id="s_fillthr"   value="1.5">
  <input id="s_sheetW"    value="600">
  <input id="s_sheetH"    value="400">
  <input id="s_gap"       value="3">
  <input id="s_eff"       value="90">
  <input id="qty"         value="1">
  <input id="s_gOnDisp"   type="checkbox" checked>
  <input id="s_gOnFunc"   type="checkbox" checked>
</div>

<script>
"use strict";

// ================================================================
// FUNCTIONS UNDER TEST — copied verbatim from quote.html
// ================================================================
function tokenize(text){var raw=text.split(/\r\n|\r|\n/),pairs=[],i=0;while(i<raw.length-1){var cs=raw[i].trim();if(!/^-?\d+$/.test(cs)){i++;continue;}pairs.push({code:parseInt(cs,10),val:(raw[i+1]||"").trim()});i+=2;}return pairs;}
function parseDXF(text){
  if(/^\s*AutoCAD Binary DXF/.test(text)) throw {nice:"That's a binary DXF. Re-export as ASCII DXF and try again."};
  if(/^(AC10|AC1\.|MC0\.0)/.test(text.slice(0,6))) throw {nice:"That looks like a DWG file. Export it as DXF first."};
  var pairs=tokenize(text);if(!pairs.length)throw{nice:"Couldn't read any data. Is this a plain DXF?"};
  var layerMap=parseLayerColours(pairs);
  var insunits=null,section=null,inEnt=false,entities=[],cur=null;
  for(var i=0;i<pairs.length;i++){var code=pairs[i].code,val=pairs[i].val;
    if(code===0&&val==="SECTION"){section=(pairs[i+1]&&pairs[i+1].code===2)?pairs[i+1].val:null;inEnt=(section==="ENTITIES");continue;}
    if(code===0&&val==="ENDSEC"){if(cur){entities.push(cur);cur=null;}section=null;inEnt=false;continue;}
    if(section==="HEADER"&&code===9&&val==="$INSUNITS"){for(var j=i+1;j<pairs.length&&pairs[j].code!==9;j++){if(pairs[j].code===70){insunits=parseInt(pairs[j].val,10);break;}}continue;}
    if(inEnt){if(code===0){if(cur)entities.push(cur);cur={type:val,p:[]};}else if(cur)cur.p.push({code:code,val:val});}}
  var merged=[];
  for(var k=0;k<entities.length;k++){var e=entities[k];
    if(e.type==="POLYLINE"){var verts=[],closed=(num(e,70,0)&1)===1,layer=str(e,8,"0"),col=num(e,62,null);k++;
      while(k<entities.length&&entities[k].type==="VERTEX"){verts.push([num(entities[k],10,0),num(entities[k],20,0),num(entities[k],42,0)]);k++;}
      if(k<entities.length&&entities[k].type!=="SEQEND")k--;
      merged.push({type:"_POLY",verts:verts,closed:closed,layer:layer,col:col});}
    else merged.push(e);}
  var flags={spline:false,ellipse:false,insert:false,text:false},contours=[];
  for(var m=0;m<merged.length;m++){var en=merged[m];try{
    var layer=en.layer!==undefined?en.layer:str(en,8,"0"),col=en.col!==undefined?en.col:num(en,62,null);
    col=resolveCol(col,layer,layerMap);
    switch(en.type){
      case "LINE":add(contours,[[num(en,10,0),num(en,20,0)],[num(en,11,0),num(en,21,0)]],false,layer,col,"LINE");break;
      case "CIRCLE":add(contours,arc([num(en,10,0),num(en,20,0)],num(en,40,0),0,360),true,layer,col,"CIRCLE");break;
      case "ARC":add(contours,arc([num(en,10,0),num(en,20,0)],num(en,40,0),num(en,50,0),num(en,51,0)),false,layer,col,"ARC");break;
      case "LWPOLYLINE":var lw=readLW(en);add(contours,expand(lw.pts,lw.closed),lw.closed,layer,col,"LWPOLYLINE");break;
      case "_POLY":add(contours,expand(en.verts,en.closed),en.closed,layer,col,"POLYLINE");break;
      case "ELLIPSE":flags.ellipse=true;var t0=num(en,41,0),t1=num(en,42,Math.PI*2);add(contours,ellipse([num(en,10,0),num(en,20,0)],[num(en,11,0),num(en,21,0)],num(en,40,1),t0,t1),Math.abs((t1-t0)-Math.PI*2)<1e-3,layer,col,"ELLIPSE");break;
      case "SPLINE":flags.spline=true;var fit=xy(en,11,21),ctl=xy(en,10,20),pts=(fit.length>=2?fit:ctl);if(pts.length>=2)add(contours,pts,false,layer,col,"SPLINE");break;
      case "INSERT":flags.insert=true;break;
      case "TEXT":case "MTEXT":flags.text=true;break;
    }}catch(_){}}
  return {contours:contours,insunits:insunits,flags:flags};
}
function parseLayerColours(pairs){var map={},section=null,cur=null;for(var i=0;i<pairs.length;i++){var c=pairs[i].code,v=pairs[i].val;if(c===0&&v==="SECTION"){section=(pairs[i+1]&&pairs[i+1].code===2)?pairs[i+1].val:null;cur=null;continue;}if(c===0&&v==="ENDSEC"){if(cur&&cur.name)map[cur.name]=cur.col;section=null;cur=null;continue;}if(section!=="TABLES")continue;if(c===0){if(cur&&cur.name)map[cur.name]=cur.col;cur=(v==="LAYER")?{name:null,col:null}:null;}else if(cur){if(c===2)cur.name=v;else if(c===62)cur.col=parseInt(v,10);}}if(cur&&cur.name)map[cur.name]=cur.col;return map;}
function resolveCol(entCol,layer,map){if(entCol!=null&&entCol>0&&entCol!==256)return entCol;var lc=map[layer];return (lc!=null&&lc>0)?lc:null;}
function num(e,c,d){for(var i=0;i<(e.p||[]).length;i++)if(e.p[i].code===c)return parseFloat(e.p[i].val);return d===undefined?null:d;}
function str(e,c,d){for(var i=0;i<(e.p||[]).length;i++)if(e.p[i].code===c)return e.p[i].val;return d;}
function xy(e,cx,cy){var o=[],x=null;for(var i=0;i<e.p.length;i++){var pr=e.p[i];if(pr.code===cx)x=parseFloat(pr.val);else if(pr.code===cy&&x!==null){o.push([x,parseFloat(pr.val)]);x=null;}}return o;}
function readLW(e){var pts=[],closed=false,last=null;for(var i=0;i<e.p.length;i++){var pr=e.p[i];if(pr.code===70)closed=(parseInt(pr.val,10)&1)===1;else if(pr.code===10){last=[parseFloat(pr.val),0,0];pts.push(last);}else if(pr.code===20&&last)last[1]=parseFloat(pr.val);else if(pr.code===42&&last)last[2]=parseFloat(pr.val);}return {pts:pts,closed:closed};}
function expand(verts,closed){if(!verts.length)return [];var out=[[verts[0][0],verts[0][1]]],n=verts.length,lim=closed?n:n-1;for(var i=0;i<lim;i++){var a=verts[i],b=verts[(i+1)%n],bg=a[2]||0;if(Math.abs(bg)>1e-9){var seg=bulge(a[0],a[1],b[0],b[1],bg);for(var j=0;j<seg.length;j++)out.push(seg[j]);}else out.push([b[0],b[1]]);}return out;}
function bulge(x1,y1,x2,y2,b){var th=4*Math.atan(b),ch=Math.hypot(x2-x1,y2-y1);if(ch<1e-9||Math.abs(th)<1e-9)return [[x2,y2]];var r=ch/(2*Math.sin(Math.abs(th)/2)),ca=Math.atan2(y2-y1,x2-x1),a=ca+(Math.PI/2-th/2),cx=x1+r*Math.cos(a),cy=y1+r*Math.sin(a),sa=Math.atan2(y1-cy,x1-cx),seg=Math.max(2,Math.ceil(Math.abs(th)/(Math.PI/24))),o=[];for(var i=1;i<=seg;i++){var t=sa+th*(i/seg);o.push([cx+r*Math.cos(t),cy+r*Math.sin(t)]);}return o;}
function arc(c,r,a0d,a1d){var a0=a0d*Math.PI/180,a1=a1d*Math.PI/180,sw=a1-a0;if(sw<=0)sw+=Math.PI*2;var seg=Math.max(8,Math.ceil(sw/(Math.PI/36))),o=[];for(var i=0;i<=seg;i++){var t=a0+sw*(i/seg);o.push([c[0]+r*Math.cos(t),c[1]+r*Math.sin(t)]);}return o;}
function ellipse(c,mj,ratio,t0,t1){var mn=[-mj[1]*ratio,mj[0]*ratio],sw=t1-t0;if(sw<=0)sw+=Math.PI*2;var seg=Math.max(16,Math.ceil(sw/(Math.PI/36))),o=[];for(var i=0;i<=seg;i++){var t=t0+sw*(i/seg);o.push([c[0]+mj[0]*Math.cos(t)+mn[0]*Math.sin(t),c[1]+mj[1]*Math.cos(t)+mn[1]*Math.sin(t)]);}return o;}
function add(arr,pts,closed,layer,col,etype){if(pts&&pts.length>=2)arr.push({pts:pts,closed:closed,layer:layer||"0",col:col,etype:etype||"?"});}
function build(parsed,scale){
  var gm={},order=[],minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(var i=0;i<parsed.contours.length;i++){var c=parsed.contours[i],key=c.layer||"0";
    if(!gm[key]){gm[key]={key:key,col:c.col,contours:[]};order.push(key);}
    if(gm[key].col==null&&c.col!=null)gm[key].col=c.col;
    var pts=[];for(var j=0;j<c.pts.length;j++){var x=c.pts[j][0]*scale,y=c.pts[j][1]*scale;pts.push([x,y]);if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;}
    gm[key].contours.push({pts:pts,closed:c.closed});}
  if(!isFinite(minX))return null;var groups=[];
  for(var k=0;k<order.length;k++){var g=gm[order[k]],set={},len=0,area=0,count=g.contours.length;
    for(var ci=0;ci<g.contours.length;ci++){var ct=g.contours[ci],p=ct.pts;
      for(var s=1;s<p.length;s++)len+=uniqSeg(set,p[s-1],p[s]);
      if(ct.closed&&p.length>1){len+=uniqSeg(set,p[p.length-1],p[0]);area+=Math.abs(shoelace(p));}}
    groups.push({key:g.key,col:g.col,len:len,area:area,count:count,label:(g.key&&g.key!=="0")?g.key:(g.col!=null?("colour "+g.col):"layer 0")});}
  return {groups:groups,minX:minX,minY:minY,maxX:maxX,maxY:maxY,W:maxX-minX,H:maxY-minY,count:parsed.contours.length,flags:parsed.flags};
}
function uniqSeg(set,a,b){var L=Math.hypot(b[0]-a[0],b[1]-a[1]);if(L<1e-9)return 0;var ax=Math.round(a[0]*100),ay=Math.round(a[1]*100),bx=Math.round(b[0]*100),by=Math.round(b[1]*100);var key=(ax<bx||(ax===bx&&ay<=by))?ax+","+ay+","+bx+","+by:bx+","+by+","+ax+","+ay;if(set[key])return 0;set[key]=1;return L;}
function shoelace(p){var s=0;for(var i=0;i<p.length;i++){var q=p[(i+1)%p.length];s+=p[i][0]*q[1]-q[0]*p[i][1];}return s/2;}
function contourLen(pts,closed){var L=0;for(var i=1;i<pts.length;i++)L+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);if(closed&&pts.length>1)L+=Math.hypot(pts[0][0]-pts[pts.length-1][0],pts[0][1]-pts[pts.length-1][1]);return L;}
function bboxMM(pts,sc){var a={minX:1e9,minY:1e9,maxX:-1e9,maxY:-1e9};for(var i=0;i<pts.length;i++){var x=pts[i][0]*sc,y=pts[i][1]*sc;if(x<a.minX)a.minX=x;if(x>a.maxX)a.maxX=x;if(y<a.minY)a.minY=y;if(y>a.maxY)a.maxY=y;}a.area=Math.max(0,a.maxX-a.minX)*Math.max(0,a.maxY-a.minY);return a;}
function autoOpFor(m){if(m.frame)return "cut";if(m.etype==="CIRCLE")return "cut";if(m.etype==="SPLINE")return "engrave";if(m.closed&&!m.contained)return "cut";return "engrave";}
function partsPerSheet(pw,ph,sc){
  if(pw<=0||ph<=0)return {n:1,oversize:false};
  var gap=sc.gap,SW=sc.sheetW,SH=sc.sheetH;
  function fit(a,b){var nx=Math.floor((SW+gap)/(a+gap)),ny=Math.floor((SH+gap)/(b+gap));return (nx>0&&ny>0)?nx*ny:0;}
  var raw=Math.max(fit(pw,ph),fit(ph,pw));
  if(raw<=0)return {n:1,oversize:true};
  return {n:Math.max(1,Math.floor(raw*sc.eff)),oversize:false};
}

// ================================================================
// TEST-ONLY: computePlan and price that take config, not DOM
// ================================================================
var MATERIALS_T=[
  {type:"Clear acrylic",thick:3,sheet:16,fd:12,fw:22,lead:3,sheets:10}
];
var CFG_DEFAULT={margin:1.5,setup:8,min:15,safety:15,voldisc:2,voldiscMax:40,machine:1.50,polish:0.015,transit:0.03,score:120,fillStd:200,fillFine:110,fillThr:1.5,sheetW:600,sheetH:400,gap:3,eff:0.90};

function computePlanT(parsed,geom,cfg){
  cfg=cfg||CFG_DEFAULT;
  var thr=cfg.fillThr,sc=1,cs=parsed.contours,jt="auto",engMode="shaded",g=geom;
  var ov={minX:g.minX,minY:g.minY,maxX:g.maxX,maxY:g.maxY},tol=Math.max(1,Math.max(g.W,g.H)*0.015);
  var meta=[];
  for(var i=0;i<cs.length;i++){var c=cs[i],frame=c.pts.length>=2;
    for(var j=0;j<c.pts.length&&frame;j++){var x=c.pts[j][0]*sc,y=c.pts[j][1]*sc;if(!(Math.abs(x-ov.minX)<=tol||Math.abs(x-ov.maxX)<=tol||Math.abs(y-ov.minY)<=tol||Math.abs(y-ov.maxY)<=tol))frame=false;}
    meta.push({closed:c.closed,etype:c.etype,len:contourLen(c.pts,c.closed)*sc,area:c.closed?Math.abs(shoelace(c.pts))*sc*sc:0,bb:bboxMM(c.pts,sc),frame:frame,contained:false});}
  var closedIdx=[];for(i=0;i<meta.length;i++)if(meta[i].closed)closedIdx.push(i);
  function inside(a,b){var e=0.5;return a.minX>=b.minX-e&&a.maxX<=b.maxX+e&&a.minY>=b.minY-e&&a.maxY<=b.maxY+e&&a.area<b.area;}
  for(var ci=0;ci<closedIdx.length;ci++){var ii=closedIdx[ci];for(var cj=0;cj<closedIdx.length;cj++){var jj=closedIdx[cj];if(jj!==ii&&inside(meta[ii].bb,meta[jj].bb)){meta[ii].contained=true;break;}}}
  var cutLen=0,engFillArea=0,engLineLen=0,fillCount=0,lineCount=0,cutCount=0,kinds=[],manualCount=0;
  for(i=0;i<cs.length;i++){var m=meta[i],op=autoOpFor(m);
    if(op==="cut"){cutLen+=m.len;kinds[i]="cut";cutCount++;continue;}
    if(!m.closed){engLineLen+=m.len;kinds[i]="engline";lineCount++;continue;}
    var ratio=m.len>0?m.area/m.len:0;
    var asFill=(engMode==="shaded")?true:(ratio>=thr);
    if(asFill){engFillArea+=m.area;kinds[i]="engfill";fillCount++;}else{engLineLen+=m.len;kinds[i]="engline";lineCount++;}
  }
  var eng=fillCount+lineCount;
  var mode=(cutCount>0&&eng>0?"cutengrave":(eng>0?"engrave":"cutonly"));
  return {cutLen:cutLen,engFillArea:engFillArea,engLineLen:engLineLen,fillCount:fillCount,lineCount:lineCount,cutCount:cutCount,kinds:kinds,mode:mode,manualCount:manualCount};
}

function priceT(geom,plan,cfg,qty){
  cfg=cfg||CFG_DEFAULT;qty=qty||1;
  var m=MATERIALS_T[0],feedCut=m.fd;
  var fill=cfg.fillStd;
  var sec=plan.cutLen/feedCut+plan.engLineLen/cfg.score+plan.engFillArea/fill;
  var minutes=sec/60+geom.count*cfg.transit,machCost=minutes*cfg.machine;
  var pack=partsPerSheet(geom.W,geom.H,cfg);
  var matCostEach=pack.oversize?m.sheet:m.sheet/pack.n;
  var finishing=plan.cutLen*cfg.polish;
  var perPart=matCostEach+machCost+finishing;
  var disc=Math.min(cfg.voldiscMax,Math.max(0,qty-1)*cfg.voldisc)/100;
  var batch=(cfg.setup+perPart*(1-disc)*qty)*cfg.margin;
  var safety=1+cfg.safety/100,total=Math.max(cfg.min,batch)*safety;
  return {total:total,unit:total/qty,partsPerSheet:pack.n,oversize:pack.oversize,machCost:machCost,matCostEach:matCostEach};
}

// ================================================================
// DXF BUILDERS
// ================================================================
function hdr(insunits){
  if(insunits==null)return "0\nSECTION\n2\nENTITIES\n";
  return "0\nSECTION\n2\nHEADER\n9\n$INSUNITS\n70\n"+insunits+"\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n";
}
var FTR="0\nENDSEC\n0\nEOF\n";
function dRect(x,y,w,h,layer,closed){layer=layer||"CUT";closed=(closed!==false)?1:0;return "0\nLWPOLYLINE\n8\n"+layer+"\n90\n4\n70\n"+closed+"\n10\n"+x+"\n20\n"+y+"\n10\n"+(x+w)+"\n20\n"+y+"\n10\n"+(x+w)+"\n20\n"+(y+h)+"\n10\n"+x+"\n20\n"+(y+h)+"\n";}
function dCircle(cx,cy,r,layer){return "0\nCIRCLE\n8\n"+(layer||"CUT")+"\n10\n"+cx+"\n20\n"+cy+"\n40\n"+r+"\n";}
function dLine(x1,y1,x2,y2,layer){return "0\nLINE\n8\n"+(layer||"CUT")+"\n10\n"+x1+"\n20\n"+y1+"\n11\n"+x2+"\n21\n"+y2+"\n";}
function dArc(cx,cy,r,a0,a1,layer){return "0\nARC\n8\n"+(layer||"CUT")+"\n10\n"+cx+"\n20\n"+cy+"\n40\n"+r+"\n50\n"+a0+"\n51\n"+a1+"\n";}
function dText(x,y,txt,layer){return "0\nTEXT\n8\n"+(layer||"TEXT")+"\n10\n"+x+"\n20\n"+y+"\n40\n5\n1\n"+txt+"\n";}
function dInsert(name,layer){return "0\nINSERT\n8\n"+(layer||"0")+"\n2\n"+name+"\n10\n0\n20\n0\n";}
function dLWBulge(pts,closed,bulgeAt,bulgeVal,layer){
  var s="0\nLWPOLYLINE\n8\n"+(layer||"CUT")+"\n90\n"+pts.length+"\n70\n"+(closed?1:0)+"\n";
  for(var i=0;i<pts.length;i++){s+="10\n"+pts[i][0]+"\n20\n"+pts[i][1]+"\n";if(i===bulgeAt)s+="42\n"+bulgeVal+"\n";}
  return s;
}
function dPolyline(pts,closed,layer){
  var s="0\nPOLYLINE\n8\n"+(layer||"CUT")+"\n70\n"+(closed?1:0)+"\n";
  for(var i=0;i<pts.length;i++)s+="0\nVERTEX\n8\n"+(layer||"CUT")+"\n10\n"+pts[i][0]+"\n20\n"+pts[i][1]+"\n";
  s+="0\nSEQEND\n";return s;
}
function makeSimpleRect(w,h,units){return hdr(units||4)+dRect(0,0,w,h,"CUT",true)+FTR;}

// ================================================================
// TEST FRAMEWORK
// ================================================================
var RESULTS=[];
var TOTAL=0,PASS=0,FAIL=0,WARN=0;

function approx(a,b,tol){return Math.abs(a-b)<=(tol!=null?tol:0.5);}

function T(cat,name,fn){
  TOTAL++;
  var r={cat:cat,name:name,pass:false,warn:false,msg:"",detail:"",ms:0};
  var t0=performance.now();
  try{
    var out=fn();
    r.pass=out.pass!==false;
    r.warn=!!out.warn;
    r.msg=out.msg||(r.pass?"OK":"FAILED");
    r.detail=out.detail||"";
  }catch(e){
    r.pass=false;
    r.msg="UNCAUGHT EXCEPTION: "+(e&&e.message?e.message:(e&&e.nice?e.nice:String(e)));
    r.detail=e&&e.stack?e.stack:"";
  }
  r.ms=+(performance.now()-t0).toFixed(1);
  if(r.pass&&r.warn)WARN++;else if(r.pass)PASS++;else FAIL++;
  RESULTS.push(r);
}

// helper: expect parseDXF to throw with .nice
function expectNice(fn){
  try{fn();return{pass:false,msg:"Expected a nice error but none was thrown"};}
  catch(e){if(e&&e.nice)return{pass:true,msg:"Got expected error: "+e.nice};return{pass:false,msg:"Threw without .nice: "+(e.message||e)};}
}
// helper: expect parseDXF to throw anything
function expectThrows(fn){
  try{fn();return{pass:false,msg:"Expected a throw but none happened"};}
  catch(e){return{pass:true,msg:"Threw as expected: "+(e.nice||e.message||e)};}
}
// helper: parse + build, return {parsed, geom, scale} or fail result
function pb(dxf,scale){
  var parsed=parseDXF(dxf);
  var s=scale!=null?scale:1;
  var geom=build(parsed,s);
  return{parsed:parsed,geom:geom,scale:s};
}

  var p=priceT(r.geom,plan,CFG_DEFAULT,1);
  return{pass:p.total>0&&isFinite(p.total),msg:"Price=$"+p.total.toFixed(2)};
});

// ================================================================
// RENDER DASHBOARD
// ================================================================
document.getElementById("progress").style.display="none";

var cats={};
RESULTS.forEach(function(r){if(!cats[r.cat])cats[r.cat]=[];cats[r.cat].push(r);});

var sumEl=document.getElementById("summary");
var pct=TOTAL>0?Math.round(PASS/TOTAL*100):0;
sumEl.innerHTML=
  '<div class="stat s-total"><div class="k">Total</div><div class="v">'+TOTAL+'</div></div>'+
  '<div class="stat s-ok"><div class="k">Passed</div><div class="v">'+PASS+'</div></div>'+
  '<div class="stat s-fail"><div class="k">Failed</div><div class="v">'+FAIL+'</div></div>'+
  '<div class="stat s-warn"><div class="k">Warnings</div><div class="v">'+WARN+'</div></div>'+
  '<div class="stat"><div class="k">Pass rate</div><div class="v" style="color:var(--'+(pct>=90?"ok":pct>=70?"warn":"err")+')">'+pct+'%</div></div>';

// Filter bar
var fb=document.getElementById("filterBar");
var filters=["All","Passed","Failed","Warnings"];
var activeFilter="All";
filters.forEach(function(f){
  var b=document.createElement("button");
  b.className="filter-btn"+(f==="All"?" active":"");
  b.textContent=f;
  b.onclick=function(){
    activeFilter=f;
    document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");
    renderResults();
  };
  fb.appendChild(b);
});

function renderResults(){
  var out=document.getElementById("results");
  out.innerHTML="";
  Object.keys(cats).sort().forEach(function(cat){
    var tests=cats[cat].filter(function(r){
      if(activeFilter==="All")return true;
      if(activeFilter==="Failed")return !r.pass;
      if(activeFilter==="Passed")return r.pass&&!r.warn;
      if(activeFilter==="Warnings")return r.warn;
      return true;
    });
    if(!tests.length)return;
    var catPass=cats[cat].filter(function(r){return r.pass;}).length;
    var catTotal=cats[cat].length;
    var sec=document.createElement("div");sec.className="category";
    var head=document.createElement("div");head.className="cat-head";
    head.innerHTML='<span>'+cat+'</span><span class="cat-stats">'+catPass+' / '+catTotal+' passed</span>';
    sec.appendChild(head);
    tests.forEach(function(r){
      var cls="test"+(r.pass?(r.warn?" t-warn":""):" t-fail");
      var badge=r.pass?(r.warn?"warn":"pass"):"fail";
      var label=r.pass?(r.warn?"WARN":"PASS"):"FAIL";
      var div=document.createElement("div");div.className=cls;
      div.innerHTML='<div class="test-head"><span class="badge '+badge+'">'+label+'</span><span class="test-name">'+r.name+'</span><span class="test-time">'+r.ms+'ms</span></div>'+
        '<div class="test-body"><div class="test-msg '+(r.pass?(r.warn?"wrn":"ok"):"err")+'">'+escHtml(r.msg)+'</div>'+(r.detail?'<pre>'+escHtml(r.detail.slice(0,800))+'</pre>':'')+'</div>';
      div.querySelector(".test-head").onclick=function(){
        var body=div.querySelector(".test-body");
        body.classList.toggle("open");
      };
      if(!r.pass)div.querySelector(".test-body").classList.add("open");
      sec.appendChild(div);
    });
    out.appendChild(sec);
  });
}

function escHtml(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

renderResults();
</script>
</body>
</html>
